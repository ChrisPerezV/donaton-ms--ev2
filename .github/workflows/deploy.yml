name: CI/CD Pipeline AWS (Completo Fases 3 y 4)

on:
  push:
    branches: [ "main" ] # Se dispara al subir código a la rama main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:

  # ==========================================
  # I. COMPILAR, PREPARAR NUBE Y SUBIR A ECR
  # ==========================================
  build-push-ecr:
    name: Construir y Subir a ECR
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar el código
        uses: actions/checkout@v4

      - name: 2. Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. Compilar Microservicios con Maven
        run: |
          mvn clean package -DskipTests -f ms-usuarios/pom.xml
          mvn clean package -DskipTests -f ms-logistica/pom.xml
          mvn clean package -DskipTests -f ms-necesidades/pom.xml
          mvn clean package -DskipTests -f ms-donaciones/pom.xml
          mvn clean package -DskipTests -f api-gateway/pom.xml

      - name: 4. Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # --- NUEVAS ETAPAS PARA CUMPLIR LA RÚBRICA ---
      
      - name: 4.1 Infraestructura como Código (IE5 - SQS)
        run: |
          echo "Asegurando que las colas de mensajería existan en AWS..."
          aws sqs create-queue --queue-name cola-donaciones-aprobadas || echo "Cola principal ya operativa"
          aws sqs create-queue --queue-name cola-alertas-urgencia || echo "Cola de alertas ya operativa"

      - name: 4.2 Empaquetar y Desplegar FaaS / Lambda (IE10)
        run: |
          echo "Empaquetando módulo Serverless..."
          cd serverless-alerts
          chmod +x build.sh
          ./build.sh
          # Nota: Si la función aún no está creada a mano en AWS, este paso avisará sin detener el pipeline
          aws lambda update-function-code --function-name lambda-alertas --zip-file fileb://lambda-alertas.zip || echo "⚠️ Recuerda crear la función 'lambda-alertas' en la consola de AWS para que se actualice el código."
          
      # ---------------------------------------------

      - name: 5. Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 6. Construir y Subir Imágenes Docker (IE4)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: latest
        run: |
          # 1. Microservicio Usuarios
          docker build -t $REGISTRY/donaton-ms-usuarios:$TAG ./ms-usuarios
          docker push $REGISTRY/donaton-ms-usuarios:$TAG
          
          # 2. Microservicio Logística
          docker build -t $REGISTRY/donaton-ms-logistica:$TAG ./ms-logistica
          docker push $REGISTRY/donaton-ms-logistica:$TAG
          
          # 3. Microservicio Necesidades
          docker build -t $REGISTRY/donaton-ms-necesidades:$TAG ./ms-necesidades
          docker push $REGISTRY/donaton-ms-necesidades:$TAG

          # 4. Microservicio Donaciones
          docker build -t $REGISTRY/donaton-ms-donaciones:$TAG ./ms-donaciones
          docker push $REGISTRY/donaton-ms-donaciones:$TAG
          
          # 5. API GATEWAY
          docker build -t $REGISTRY/donaton-api-gateway:$TAG ./api-gateway
          docker push $REGISTRY/donaton-api-gateway:$TAG

  # ==========================================
  # II. DESPLEGAR EN LA EC2 PRIVADA (VÍA BASTIÓN)
  # ==========================================
  deploy-ec2-private:
    name: Desplegar en EC2 Privada
    needs: build-push-ecr
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Copiar archivos a la EC2 Privada a través del Bastión
        uses: appleboy/scp-action@master
        with:
          # 1. Datos del Bastión (El guardia de entrada)
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.EC2_USERNAME }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          
          # 2. Datos de la máquina destino (La privada)
          host: ${{ secrets.PRIVATE_EC2_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          
          source: "docker-compose.prod.yml,mysql-init/"
          target: "~/donaton/"

      - name: Ejecutar comandos en la EC2 Privada a través del Bastión (IE6)
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        with:
          # 1. Datos del Bastión
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.EC2_USERNAME }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          
          # 2. Datos de la máquina destino
          host: ${{ secrets.PRIVATE_EC2_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          
          envs: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION, AWS_ACCOUNT_ID
          script: |
            export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            export AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN
            
            # Autenticamos el Docker de la máquina privada contra ECR
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            
            # Actualizamos el Docker Swarm
            cd ~/donaton
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d